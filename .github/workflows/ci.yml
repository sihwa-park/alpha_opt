name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:

    #- name: apt-get stuff needed for mpi
    #  run: |
    #    sudo apt-get update
    #    sudo apt-get install -y build-essential gfortran openmpi-bin libopenmpi-dev

    - uses: actions/checkout@v5

    - name: pwd
      run: pwd

    - name: ls
      run: ls -l

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: which pip after python setup
      run: |
        python -m pip install --upgrade pip
        pip --version

    - name: Install OpenMPI
      run: |
        sudo apt-get update
        sudo apt-get install -y openmpi-bin libopenmpi-dev

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install mpi4py
  
    - name: Install package
      run: pip install -v -e .

    - name: Run tests
      run: |
        cd tests
        pytest

    - name: Run MPI test_usable_space
      run: |
        mpiexec -n 2 pytest tests/test_usable_space.py::test_usable_space

    #- name: Run MPI tests
    #  run: ./run_tests_mpi
  
  